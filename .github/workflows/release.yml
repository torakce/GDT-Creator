name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore solution
        run: dotnet restore GdtCreator.sln --configfile NuGet.Config

      - name: Restore win-x64 publish dependencies
        run: >-
          dotnet restore GdtCreator.Wpf/GdtCreator.Wpf.csproj
          -r win-x64
          /p:SelfContained=true
          --configfile NuGet.Config

      - name: Run tests
        run: dotnet run --project GdtCreator.Tests/GdtCreator.Tests.csproj -c Release --no-restore

      - name: Publish portable single-file build
        shell: pwsh
        run: |
          dotnet publish GdtCreator.Wpf/GdtCreator.Wpf.csproj `
            -c Release `
            -r win-x64 `
            /p:SelfContained=true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:PublishTrimmed=false `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            --no-restore `
            --output artifacts/publish/win-x64

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $releaseDir = "artifacts/release"
          $portableExe = Join-Path $releaseDir "GDT-Creator.exe"
          $readmePath = Join-Path $releaseDir "README.txt"
          $zipPath = Join-Path $releaseDir ("GDT-Creator-" + $tag + "-win-x64.zip")

          if (Test-Path $releaseDir) {
            Remove-Item $releaseDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $publishedExe = Get-ChildItem "artifacts/publish/win-x64" -Filter "*.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $publishedExe) {
            throw "Published executable not found."
          }

          Copy-Item $publishedExe $portableExe -Force
          Set-Content -Path $readmePath -Value "Run GDT-Creator.exe. No installer required."
          Compress-Archive -Path $portableExe, $readmePath -DestinationPath $zipPath -CompressionLevel Optimal

          "exe_path=$portableExe" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = "${{ steps.assets.outputs.exe_path }}"
          $zip = "${{ steps.assets.outputs.zip_path }}"

          if (gh release view $tag *> $null) {
            gh release upload $tag $exe $zip --clobber
          }
          else {
            gh release create $tag $exe $zip --title "GDT Creator $tag" --generate-notes
          }

